name: Update Daily Words & Puzzles

'on':
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  populate:
    runs-on: ubuntu-latest
    env:
      OWNER: 28pins
      PUSH_TOKEN: ${{ secrets.CROSS_REPO_PUSH_TOKEN }}
      COMMIT_MESSAGE: 'chore: update daily words and puzzles'
    steps:
      - name: Checkout CLIWordGames
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate cross-repo token
        run: |
          set -euo pipefail
          if [ -z "${PUSH_TOKEN}" ]; then
            echo "CROSS_REPO_PUSH_TOKEN is required for cross-repository pushes."
            exit 1
          fi

      - name: Checkout CLIGames-web
        uses: actions/checkout@v4
        with:
          repository: 28pins/CLIGames-web
          token: ${{ env.PUSH_TOKEN }}
          path: ../CLIGames-web
          fetch-depth: 0

      - name: Checkout Wrdli
        uses: actions/checkout@v4
        with:
          repository: 28pins/Wrdli
          token: ${{ env.PUSH_TOKEN }}
          path: ../Wrdli
          fetch-depth: 0

      - name: Checkout Cli-nnections
        uses: actions/checkout@v4
        with:
          repository: 28pins/Cli-nnections
          token: ${{ env.PUSH_TOKEN }}
          path: ../Cli-nnections
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run populate script
        working-directory: ${{ github.workspace }}
        run: node scripts/populate_dailyWords.js

      - name: Sync generated data to sibling repositories
        run: |
          set -euo pipefail

          copy_file() {
            local src="$1"
            local dst="$2"

            if [ ! -f "${src}" ]; then
              echo "Source file missing: ${src}"
              exit 1
            fi

            if [ ! -d "$(dirname "${dst}")" ]; then
              echo "Destination directory missing: $(dirname "${dst}")"
              exit 1
            fi

            cp "${src}" "${dst}"
          }

          copy_file "${GITHUB_WORKSPACE}/CLIGames-web/src/js/words_dailyWords.js" "${GITHUB_WORKSPACE}/../CLIGames-web/src/js/words_dailyWords.js"
          copy_file "${GITHUB_WORKSPACE}/CLIGames-web/src/js/categories_dailyPuzzles.js" "${GITHUB_WORKSPACE}/../CLIGames-web/src/js/categories_dailyPuzzles.js"
          copy_file "${GITHUB_WORKSPACE}/Wrdli/wrdli_words.js" "${GITHUB_WORKSPACE}/../Wrdli/wrdli_words.js"
          copy_file "${GITHUB_WORKSPACE}/Cli-nnections/cli-nnections_puzzles.js" "${GITHUB_WORKSPACE}/../Cli-nnections/cli-nnections_puzzles.js"

      - name: Commit and push updates
        run: |
          set -euo pipefail

          update_repo() {
            local repo_dir="$1"
            local branch="${2:-}"

            if [ ! -d "${repo_dir}/.git" ]; then
              echo "Skipping ${repo_dir}; not a git repository."
              return
            fi

            if [ -z "$(git -C "${repo_dir}" status --porcelain)" ]; then
              echo "No changes in ${repo_dir}"
              return
            fi

            git -C "${repo_dir}" config user.name "github-actions[bot]"
            git -C "${repo_dir}" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "${repo_dir}" add -A
            git -C "${repo_dir}" commit -m "${COMMIT_MESSAGE}"

            if [ -z "${branch}" ] || [ "${branch}" = "HEAD" ]; then
              branch="$(git -C "${repo_dir}" symbolic-ref --quiet --short HEAD || true)"
            fi

            if [ -z "${branch}" ]; then
              branch="$(git -C "${repo_dir}" symbolic-ref --quiet --short refs/remotes/origin/HEAD 2>/dev/null | sed 's|^origin/||')"
            fi

            if [ -z "${branch}" ]; then
              branch="main"
            fi

            git -C "${repo_dir}" push origin "${branch}"
          }

          update_repo "${GITHUB_WORKSPACE}" "${GITHUB_REF_NAME}"
          update_repo "${GITHUB_WORKSPACE}/../CLIGames-web"
          update_repo "${GITHUB_WORKSPACE}/../Wrdli"
          update_repo "${GITHUB_WORKSPACE}/../Cli-nnections"
