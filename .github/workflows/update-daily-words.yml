name: Update Daily Words & Puzzles

'on':
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  populate:
    runs-on: ubuntu-latest
    env:
      OWNER: 28pins
      PUSH_TOKEN: ${{ secrets.CROSS_REPO_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
      COMMIT_MESSAGE: 'chore: update daily words and puzzles'
    steps:
      - name: Checkout CLIWordGames
        uses: actions/checkout@v4
        with:
          token: ${{ env.PUSH_TOKEN }}
          fetch-depth: 0

      - name: Clone sibling repositories
        run: |
          set -euo pipefail
          cd /home/runner/work
          git clone "https://x-access-token:${PUSH_TOKEN}@github.com/${OWNER}/CLIGames-web.git" CLIGames-web
          git clone "https://x-access-token:${PUSH_TOKEN}@github.com/${OWNER}/Wrdli.git" Wrdli
          git clone "https://x-access-token:${PUSH_TOKEN}@github.com/${OWNER}/Cli-nnections.git" Cli-nnections

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run populate script
        working-directory: /home/runner/work/CLIWordGames/CLIWordGames
        run: node scripts/populate_dailyWords.js

      - name: Sync generated data to sibling repositories
        run: |
          set -euo pipefail
          cp /home/runner/work/CLIWordGames/CLIWordGames/CLIGames-web/src/js/words_dailyWords.js /home/runner/work/CLIGames-web/src/js/words_dailyWords.js
          cp /home/runner/work/CLIWordGames/CLIWordGames/CLIGames-web/src/js/categories_dailyPuzzles.js /home/runner/work/CLIGames-web/src/js/categories_dailyPuzzles.js
          cp /home/runner/work/CLIWordGames/CLIWordGames/Wrdli/wrdli_words.js /home/runner/work/Wrdli/wrdli_words.js
          cp /home/runner/work/CLIWordGames/CLIWordGames/Cli-nnections/cli-nnections_puzzles.js /home/runner/work/Cli-nnections/cli-nnections_puzzles.js

      - name: Commit and push updates
        run: |
          set -euo pipefail

          update_repo() {
            local repo_dir="$1"
            local branch="${2:-}"

            if [ ! -d "${repo_dir}/.git" ]; then
              echo "Skipping ${repo_dir}; not a git repository."
              return
            fi

            if [ -z "$(git -C "${repo_dir}" status --porcelain)" ]; then
              echo "No changes in ${repo_dir}"
              return
            fi

            git -C "${repo_dir}" config user.name "github-actions[bot]"
            git -C "${repo_dir}" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "${repo_dir}" add -A
            git -C "${repo_dir}" commit -m "${COMMIT_MESSAGE}"

            if [ -z "${branch}" ] || [ "${branch}" = "HEAD" ]; then
              branch="$(git -C "${repo_dir}" symbolic-ref --quiet --short HEAD || true)"
            fi

            if [ -z "${branch}" ]; then
              branch="$(git -C "${repo_dir}" remote show origin | sed -n '/HEAD branch/s/.*: //p')"
            fi

            git -C "${repo_dir}" push origin "${branch}"
          }

          update_repo "/home/runner/work/CLIWordGames/CLIWordGames" "${GITHUB_REF_NAME}"
          update_repo "/home/runner/work/CLIGames-web"
          update_repo "/home/runner/work/Wrdli"
          update_repo "/home/runner/work/Cli-nnections"
