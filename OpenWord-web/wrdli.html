<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenWord</title>
    <style>
        :root{
            --page-bg: #f6f7f7;
            --container-bg: #eaf5ef; /* very pale muted green */
            --panel-bg: rgba(20,30,24,0.06);
            --card-bg: #343d38;
            --accent: #397a63; /* muted teal */
            --link: #2d6b5a;
        }

        .container {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            width: 50%;
            margin-left: auto;
            margin-right: auto;
            background-color: var(--container-bg);
            height: 80%;
            border-radius: 32pt;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 80vh;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            margin: 0;
        }
        .heading {
            margin: 10px;
            font-weight: bolder;
        }
        a {
            color: var(--link);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        footer {
            margin-top: auto;
            margin-bottom: 2pt;
            padding: 10pt;
            font-size: 0.9em;
            background-color: var(--panel-bg);
            border-radius: 16pt;
        }
        header {
            padding: 10pt;
            background-color: var(--panel-bg);
            border-radius: 16pt;
        }
        /* Main game box: 40 characters wide, 24 lines high */
        #game {
            font-family: 'Courier New', Courier, monospace;
            width: 60ch;
            max-width: 100%;
            line-height: 1.25;
            height: calc(24 * 1.25em);
            margin: 16px auto;
            padding: 12px;
            background: var(--card-bg);
            color: #ffffff;
            border-radius: 12pt;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            overflow: auto;
            text-align: left;
        }
    </style>
</head>
<body>
    <br>
    <div class="container">
        <header>
            <h1 class="heading">OpenWord</h1>
            <h5 class="heading">No ads.  No upsell.  Open source and in sync.</h5>
        </header>
        <div id="game">
            Error loading game.  Please try again later.
        </div>
        <footer>
            <p>Download in NodeJS for CLI or fork on <a href="https://github.com/28pins/cliwordgames">on Github</a></p>
            <p>OpenWord is licensed under the <a href="https://github.com/28pins/noailicense">NoAILicense</a>.</p>
            <p>By <a href="https://github.com/28pins">28pins</a></p>
        </footer>
        <script src="nodePorts.js"></script>
        <script src="wrdli.js"></script>
    </div>
</body>
</html>
